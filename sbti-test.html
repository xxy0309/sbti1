<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI心理测试网页</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .question {
            margin: 20px 0;
        }
        .option {
            background-color: #333;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .option.selected {
            background-color: #ffcc00;
            color: #000;
        }
        #submitBtn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #222;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>SBTI心理测试</h1>

    <div class="question" data-qid="0">
        <p>1. 看到别人成功？</p >
        <div class="option" data-value="A">他好厉害我要努力</div>
        <div class="option" data-value="B">切，靠运气罢了</div>
    </div>

    <div class="question" data-qid="1">
        <p>2. 做事到一半？</p >
        <div class="option" data-value="A">一鼓作气干完</div>
        <div class="option" data-value="B">先玩会儿再说</div>
    </div>

    <button id="submitBtn">查看抽象人格</button>
    <div id="result"></div>

    <script>
        const answers = {};
        const options = document.querySelectorAll('.option');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');

        options.forEach(option => {
            option.addEventListener('click', function() {
                // 清除同题选中状态
                const siblings = this.parentElement.querySelectorAll('.option');
                siblings.forEach(sib => sib.classList.remove('selected'));
                // 设置当前选中
                this.classList.add('selected');
                // 记录答案
                const qid = this.parentElement.dataset.qid;
                answers[qid] = this.dataset.value;
            });
        });

        submitBtn.addEventListener('click', function() {
            // 检查是否所有题目都答了
            const questions = document.querySelectorAll('.question');
            let allAnswered = true;
            questions.forEach(q => {
                if (!answers[q.dataset.qid]) {
                    allAnswered = false;
                }
            });

            if (!allAnswered) {
                alert('请完成所有题目再提交！');
                return;
            }

            // 简单的结果判断
            const ans0 = answers[0];
            const ans1 = answers[1];
            let result = '';

            if (ans0 === 'A' && ans1 === 'A') {
                result =「卷王之王：眼里只有成功」;
            } else if (ans0 === 'A' && ans1 === 'B') {
                result =「间歇性努力：想上进但懒」;
            } else if (ans0 === 'B' && ans1 === 'A') {
                result =「嘴硬行动派：嘴上酸但偷偷卷」;
            } else {
                result =「阴暗爬行：见不得别人好自己不动」;
            }

            resultDiv.innerHTML = `<h3>你的抽象人格是：</h3><p>${result}</p >`;
        });
    </script>
</body>
</html>
